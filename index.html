<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrooveOps</title>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e12;--surface:#17171f;--surface2:#1e1e2a;--border:#2a2a3a;--accent:#9c6fe4;--accent2:#e05c5c;--green:#4caf50;--blue:#4fc3f7;--text:#e8e8f0;--muted:#6b6b80;--radius:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 24px;width:100%;max-width:360px;}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--accent);margin-bottom:4px;}
.login-logo span{color:var(--text);}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.login-err{background:rgba(224,92,92,.12);border:1px solid rgba(224,92,92,.35);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--accent2);margin-bottom:14px;display:none;}
.login-err.show{display:block;}
#app{display:none;}
.form-group{margin-bottom:13px;}
label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
input[type=email],input[type=password],input[type=text],input[type=date],input[type=number],textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 12px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:56px;}
select option{background:var(--surface2);color:var(--text);}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:opacity .15s;white-space:nowrap;}
.btn:hover{opacity:.85;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-full{width:100%;}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);opacity:1;}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-danger{background:var(--accent2);color:#fff;}
.sp{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s;}
.loading-overlay.hidden{opacity:0;pointer-events:none;}
.loading-logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--accent);}
.loading-logo span{color:var(--text);}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent);}
.logo span{color:var(--text);}
.header-right{display:flex;align-items:center;gap:8px;}
.user-chip{font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-hdr{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:opacity .15s;}
.btn-hdr:hover{opacity:.85;}
.btn-hdr.outline{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-hdr.outline:hover{border-color:var(--accent2);color:var(--accent2);opacity:1;}
.nav-tabs{display:flex;gap:2px;padding:12px 16px 0;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;}
.nav-tab{padding:8px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.content{padding:16px;max-width:900px;margin:0 auto;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.stat-value{font-size:22px;font-weight:600;color:var(--text);}
.stat-value.green{color:var(--green);}
.stat-value.amber{color:var(--accent);}
.stat-value.red{color:var(--accent2);}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;color:var(--accent);}
.tbl{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;}
.tbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2);}
.tbl td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--surface2);}
.acts{display:flex;gap:6px;}
.badge{display:inline-block;font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px;}
.bg{background:rgba(76,175,80,.15);color:var(--green);border:1px solid rgba(76,175,80,.3);}
.ba{background:rgba(156,111,228,.15);color:var(--accent);border:1px solid rgba(156,111,228,.3);}
.br{background:rgba(224,92,92,.12);color:var(--accent2);border:1px solid rgba(224,92,92,.3);}
.bb{background:rgba(79,195,247,.12);color:var(--blue);border:1px solid rgba(79,195,247,.3);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;overflow-y:auto;padding:16px;}
.modal-overlay.open{display:block;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:500px;margin:20px auto 60px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;margin-bottom:16px;color:var(--accent);}
.modal-actions{display:flex;gap:10px;margin-top:18px;}
.modal-actions .btn{flex:1;padding:12px;}
.empty{text-align:center;padding:24px;color:var(--muted);}
.err-banner{background:rgba(224,92,92,.1);border:1px solid rgba(224,92,92,.3);color:var(--accent2);font-size:12px;padding:8px 16px;display:none;align-items:center;gap:8px;justify-content:space-between;}
.err-banner.show{display:flex;}
.err-banner button{background:none;border:none;color:var(--accent2);cursor:pointer;font-size:16px;}
.dp{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
.dp-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;}
.dr{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.dr:last-child{border-bottom:none;}
.dr .l{color:var(--muted);}
.dr .v{font-weight:500;text-align:right;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:16px;transition:color .15s;}
.back:hover{color:var(--accent);}
.new-cust{display:none;margin-top:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;}
.new-cust-title{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.crew-chip{font-size:12px;padding:3px 10px;border-radius:20px;display:inline-block;margin:3px;}
</style>
</head>
<body>

<div class="loading-overlay" id="lo">
  <div class="loading-logo">Groove<span>Ops</span></div>
  <div class="spinner"></div>
</div>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Groove<span>Ops</span></div>
    <div class="login-sub">Owner access only</div>
    <div class="login-err" id="lerr"></div>
    <div class="form-group"><label>Email</label><input type="email" id="lEmail" placeholder="you@example.com" autocomplete="email"></div>
    <div class="form-group"><label>Password</label><input type="password" id="lPass" placeholder="‚ÄĘ‚ÄĘ‚ÄĘ‚ÄĘ‚ÄĘ‚ÄĘ‚ÄĘ‚ÄĘ" autocomplete="current-password"></div>
    <button class="btn btn-full" id="loginBtn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<div id="app">
  <div class="err-banner" id="eb"><span id="em"></span><button onclick="document.getElementById('eb').classList.remove('show')">√ó</button></div>
  <header>
    <div class="logo">Groove<span>Ops</span></div>
    <div class="header-right">
      <div class="user-chip" id="uc"></div>
      <button class="btn-hdr outline" onclick="doLogout()">‚ŹĽ</button>
    </div>
  </header>
  <div class="nav-tabs">
    <div class="nav-tab active" onclick="showTab('dashboard')">Dashboard</div>
    <div class="nav-tab" onclick="showTab('events')">Events</div>
    <div class="nav-tab" onclick="showTab('customers')">Customers</div>
    <div class="nav-tab" onclick="showTab('payments')">Payments</div>
    <div class="nav-tab" onclick="showTab('labor')">Labor</div>
    <div class="nav-tab" onclick="showTab('expenses')">Expenses</div>
  </div>
  <div class="content" id="mc"></div>
</div>

<div class="modal-overlay" id="mo">
  <div class="modal">
    <div class="modal-title" id="mt"></div>
    <div id="mb"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn" id="msb" onclick="modalSave()">Save</button>
    </div>
  </div>
</div>

<script>
var sb, currentTab='dashboard', saveFn=null;
var C={events:[],customers:[],payments:[],labor:[],expenses:[]};

function sid(x){return String(x==null?'':x);}
function fmt(n){return'$'+(parseFloat(n)||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function fmtD(d){return d?new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'‚ÄĒ';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function findEv(id){return C.events.find(e=>sid(e.id)===sid(id));}
function findCu(id){return C.customers.find(c=>sid(c.id)===sid(id));}
function cuName(id){var c=findCu(id);return c?esc(c.name):'‚ÄĒ';}
function evName(id){var e=findEv(id);return e?esc(e.name):'‚ÄĒ';}
function cuBal(cid){
  var inv=C.events.filter(e=>sid(e.customer_id)===sid(cid)).reduce(function(s,e){return s+(parseFloat(e.invoice_amount)||0);},0);
  var paid=C.payments.filter(p=>sid(p.customer_id)===sid(cid)).reduce(function(s,p){return s+(parseFloat(p.amount)||0);},0);
  return{inv:inv,paid:paid,bal:inv-paid};
}
function evFin(eid){
  var e=findEv(eid);
  var rev=parseFloat(e&&e.invoice_amount||0)||0;
  var lab=C.labor.filter(l=>sid(l.event_id)===sid(eid)).reduce(function(s,l){return s+((parseFloat(l.hours)||0)*(parseFloat(l.rate)||0));},0);
  var exp=C.expenses.filter(x=>sid(x.event_id)===sid(eid)).reduce(function(s,x){return s+(parseFloat(x.amount)||0);},0);
  return{rev:rev,lab:lab,exp:exp,profit:rev-lab-exp};
}
function showErr(m){document.getElementById('em').textContent='‚ö† '+m;document.getElementById('eb').classList.add('show');}
function hideLoader(){var o=document.getElementById('lo');o.classList.add('hidden');setTimeout(function(){o.style.display='none';},400);}
function statusBadge(s){var cls=s==='completed'?'bg':s==='cancelled'?'br':'ba';return'<span class="badge '+cls+'">'+(s||'upcoming')+'</span>';}

function init(){
  if(typeof supabase==='undefined'||!supabase.createClient){setTimeout(init,100);return;}
  console.log('Supabase ready');
  sb=supabase.createClient(
    'https://rbtzcswnounmybumqbwu.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJidHpjc3dub3VubXlidW1xYnd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyOTI3OTgsImV4cCI6MjA5MTg2ODc5OH0.d_CSDndGJcuBve_EtHo8RDcHG8dxQVn22gpUjQ7FGNY',
    {auth:{storageKey:'grooveops-auth'}}
  );
  sb.auth.onAuthStateChange(function(event,session){
    console.log('Auth:',event,session&&session.user.email);
    if(session){
      document.getElementById('loginScreen').style.display='none';
      document.getElementById('app').style.display='block';
      document.getElementById('uc').textContent=session.user.email;
      setTimeout(hideLoader,5000);
      loadAll().then(function(){hideLoader();showTab('dashboard');});
    } else {
      document.getElementById('loginScreen').style.display='flex';
      document.getElementById('app').style.display='none';
      hideLoader();
    }
  });
}

async function loadAll(){
  console.log('loading...');
  var r=await Promise.all([
    sb.from('events').select('*').order('date',{ascending:false}),
    sb.from('customers').select('*').order('name'),
    sb.from('customer_payments').select('*').order('date',{ascending:false}),
    sb.from('labor').select('*').order('created_at',{ascending:false}),
    sb.from('expenses').select('*').order('created_at',{ascending:false})
  ]);
  C.events=r[0].data||[];C.customers=r[1].data||[];C.payments=r[2].data||[];
  C.labor=r[3].data||[];C.expenses=r[4].data||[];
  console.log('loaded',C.events.length,'events',C.customers.length,'customers');
}

function doLogin(){
  var email=document.getElementById('lEmail').value.trim();
  var pass=document.getElementById('lPass').value;
  var btn=document.getElementById('loginBtn');
  if(!email||!pass){showLErr('Please enter email and password.');return;}
  document.getElementById('lerr').classList.remove('show');
  btn.disabled=true;btn.innerHTML='<span class="sp"></span>Signing in‚Ä¶';
  sb.auth.signInWithPassword({email:email,password:pass}).then(function(r){
    if(r.error){showLErr('Incorrect email or password.');btn.disabled=false;btn.textContent='Sign In';}
  });
}
function doLogout(){sb.auth.signOut();}
function showLErr(m){var el=document.getElementById('lerr');el.textContent='‚ö† '+m;el.classList.add('show');}
document.getElementById('lPass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});

function showTab(tab){
  currentTab=tab;
  document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.toggle('active',t.textContent.toLowerCase()===tab);});
  if(tab==='dashboard')renderDash();
  else if(tab==='events')renderEvents();
  else if(tab==='customers')renderCustomers();
  else if(tab==='payments')renderPayments();
  else if(tab==='labor')renderLabor();
  else if(tab==='expenses')renderExpenses();
}

function renderDash(){
  var ti=C.events.reduce(function(s,e){return s+(parseFloat(e.invoice_amount)||0);},0);
  var tp=C.payments.reduce(function(s,p){return s+(parseFloat(p.amount)||0);},0);
  var tl=C.labor.reduce(function(s,l){return s+((parseFloat(l.hours)||0)*(parseFloat(l.rate)||0));},0);
  var te=C.expenses.reduce(function(s,x){return s+(parseFloat(x.amount)||0);},0);
  var gp=tp-tl-te;
  var up=C.events.filter(function(e){return!e.status||e.status==='upcoming';}).length;
  var ub=C.customers.filter(function(c){return cuBal(c.id).bal>0;}).length;
  document.getElementById('mc').innerHTML=
    '<div class="stat-grid">'+
    '<div class="stat-card"><div class="stat-label">Total Invoiced</div><div class="stat-value">'+fmt(ti)+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Total Collected</div><div class="stat-value green">'+fmt(tp)+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Outstanding</div><div class="stat-value '+(ti-tp>0?'amber':'')+'">'+fmt(ti-tp)+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Gross Profit</div><div class="stat-value '+(gp>=0?'green':'red')+'">'+fmt(gp)+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Upcoming</div><div class="stat-value amber">'+up+'</div></div>'+
    '<div class="stat-card"><div class="stat-label">Customers w/ Balance</div><div class="stat-value '+(ub>0?'amber':'')+'">'+ub+'</div></div>'+
    '</div>'+
    '<div class="section-header"><div class="section-title">Recent Events</div><button class="btn btn-sm btn-outline" onclick="showTab(\'events\')">View All</button></div>'+
    '<table class="tbl"><thead><tr><th>Event</th><th>Date</th><th>Customer</th><th>Invoice</th><th>Status</th></tr></thead><tbody>'+
    (C.events.slice(0,5).map(function(e){return'<tr><td style="font-weight:500">'+esc(e.name)+'</td><td>'+fmtD(e.date)+'</td><td>'+cuName(e.customer_id)+'</td><td>'+(e.invoice_amount?fmt(e.invoice_amount):'<span style="color:var(--muted)">‚ÄĒ</span>')+'</td><td>'+statusBadge(e.status)+'</td></tr>';}).join('')||'<tr><td colspan="5" class="empty">No events yet</td></tr>')+
    '</tbody></table>'+
    '<div class="section-header"><div class="section-title">Customer Balances</div><button class="btn btn-sm btn-outline" onclick="showTab(\'customers\')">View All</button></div>'+
    '<table class="tbl"><thead><tr><th>Customer</th><th>Invoiced</th><th>Paid</th><th>Balance</th></tr></thead><tbody>'+
    (C.customers.map(function(c){var b=cuBal(c.id);return'<tr><td style="font-weight:500">'+esc(c.name)+'</td><td>'+fmt(b.inv)+'</td><td style="color:var(--green)">'+fmt(b.paid)+'</td><td><span class="badge '+(b.bal>0?'ba':b.bal<0?'bb':'bg')+'">'+fmt(b.bal)+'</span></td></tr>';}).join('')||'<tr><td colspan="4" class="empty">No customers</td></tr>')+
    '</tbody></table>';
}

function renderEvents(){
  document.getElementById('mc').innerHTML=
    '<div class="section-header"><div class="section-title">Events ('+C.events.length+')</div><button class="btn btn-sm" onclick="openEvModal()">+ Add Event</button></div>'+
    '<table class="tbl"><thead><tr><th>Event</th><th>Date</th><th>Customer</th><th>Invoice</th><th>Profit</th><th>Status</th><th></th></tr></thead><tbody>'+
    (C.events.map(function(e){var f=evFin(e.id);return'<tr style="cursor:pointer" onclick="openEvDetail(\''+sid(e.id)+'\')">'+
      '<td style="font-weight:500">'+esc(e.name)+'</td><td>'+fmtD(e.date)+'</td><td>'+cuName(e.customer_id)+'</td>'+
      '<td>'+(e.invoice_amount?fmt(e.invoice_amount):'<span style="color:var(--muted)">‚ÄĒ</span>')+'</td>'+
      '<td style="color:'+(f.profit>=0?'var(--green)':'var(--accent2)')+'">'+fmt(f.profit)+'</td>'+
      '<td>'+statusBadge(e.status)+'</td>'+
      '<td onclick="event.stopPropagation()"><div class="acts">'+
        '<button class="btn btn-sm btn-outline" onclick="openEvModal(\''+sid(e.id)+'\')">Edit</button>'+
        '<button class="btn btn-sm btn-danger" onclick="delRec(\'events\',\''+sid(e.id)+'\')">Del</button>'+
      '</div></td></tr>';}).join('')||'<tr><td colspan="7" class="empty">No events yet</td></tr>')+
    '</tbody></table>';
}

function openEvDetail(id){
  var e=findEv(id); if(!e){console.error('event not found',id);return;}
  var f=evFin(id);
  var eL=C.labor.filter(function(l){return sid(l.event_id)===sid(id);});
  var eE=C.expenses.filter(function(x){return sid(x.event_id)===sid(id);});
  var eP=C.payments.filter(function(p){return sid(p.event_id)===sid(id);});
  var calCrew=(e.labor||[]).filter(function(x){return x.name;});
  var calMain=(e.main_equip||[]).filter(function(x){return x.name;});
  var calSec=(e.sec_equip||[]).filter(function(x){return x.name;});
  var calPanel='';
  if(calCrew.length||calMain.length||calSec.length){
    calPanel='<div class="dp" style="margin-bottom:16px"><div class="dp-title">From Calendar App</div>';
    if(calCrew.length){
      calPanel+='<div style="font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Crew</div><div style="margin-bottom:12px">';

        '<div class="form-group" style="margin-bottom:8px"><label>Name *</label><input type="text" id="ncN" placeholder="Full name"></div>'+
        '<div class="g2"><div class="form-group" style="margin-bottom:0"><label>Email</label><input type="email" id="ncE"></div>'+
        '<div class="form-group" style="margin-bottom:0"><label>Phone</label><input type="text" id="ncP"></div></div>'+
      '</div>'+
    '</div>'+
    '<div class="form-group"><label>Invoice Amount ($)</label><input type="number" id="mI" step="0.01" value="'+(e&&e.invoice_amount||'')+'"></div>'+
    '<div class="form-group"><label>Notes</label><textarea id="mNo">'+esc(e&&e.notes||'')+'</textarea></div>',
    async function(){
      var name=document.getElementById('mN').value.trim();
      var date=document.getElementById('mD').value;
      if(!name||!date)throw new Error('Name and date are required');
      var cid=document.getElementById('mC').value||null;
      if(cid==='__new__'){
        var nn=document.getElementById('ncN').value.trim();
        if(!nn)throw new Error('New customer name is required');
        var nr=await sb.from('customers').insert({name:nn,email:document.getElementById('ncE').value.trim()||null,phone:document.getElementById('ncP').value.trim()||null}).select().single();

        cid=nr.data.id;
      }
      var row={name:name,date:date,status:document.getElementById('mS').value,venue:document.getElementById('mV').value.trim()||null,customer_id:cid,invoice_amount:parseFloat(document.getElementById('mI').value)||null,notes:document.getElementById('mNo').value.trim()||null,updated_at:new Date().toISOString()};

      if(r.error)throw r.error;

  openModal('Add Labor Hours',
    '<div class="form-group"><label>Event</label><select id="mE">'+evOpts(eid||'')+'</select></div>'+
    '<div class="form-group"><label>Person</label><select id="mP"><option value="john">John</option><option value="steve">Steve</option></select></div>'+
    '<div class="g2"><div class="form-group"><label>Hours</label><input type="number" id="mH" step="0.25" placeholder="0.00"></div>'+
    '<div class="form-group"><label>Rate ($/hr)</label><input type="number" id="mR" step="0.01" placeholder="0.00"></div></div>'+
    '<div class="form-group"><label>Notes</label><textarea id="mNo" rows="2"></textarea></div>',
    async function(){
      var eid2=document.getElementById('mE').value;
      var hrs=parseFloat(document.getElementById('mH').value);
      if(!eid2)throw new Error('Event is required');
      if(!hrs||hrs<=0)throw new Error('Valid hours required');
      var r=await sb.from('labor').insert({event_id:eid2,person:document.getElementById('mP').value,hours:hrs,rate:parseFloat(document.getElementById('mR').value)||null,notes:document.getElementById('mNo').value.trim()||null});
      if(r.error)throw r.error;
    }
  );
}

function openExpModal(eid){
  openModal('Add Expense',
    '<div class="form-group"><label>Event</label><select id="mE">'+evOpts(eid||'')+'</select></div>'+
    '<div class="g2"><div class="form-group"><label>Person</label><select id="mP"><option value="john">John</option><option value="steve">Steve</option></select></div>'+
    '<div class="form-group"><label>Category</label><select id="mCat"><option value="travel">Travel</option><option value="toll">Toll</option><option value="equipment">Equipment</option><option value="helper">Helper Pay</option><option value="other">Other</option></select></div></div>'+
    '<div class="form-group"><label>Description</label><input type="text" id="mDesc" placeholder="e.g. Turnpike toll"></div>'+
    '<div class="form-group"><label>Amount ($)</label><input type="number" id="mA" step="0.01" placeholder="0.00"></div>'+
    '<div class="form-group"><label>Notes</label><textarea id="mNo" rows="2"></textarea></div>',
    async function(){
      var eid2=document.getElementById('mE').value;
      var amt=parseFloat(document.getElementById('mA').value);
      if(!eid2)throw new Error('Event is required');
      if(!amt||amt<=0)throw new Error('Valid amount required');
      var r=await sb.from('expenses').insert({event_id:eid2,person:document.getElementById('mP').value,category:document.getElementById('mCat').value,description:document.getElementById('mDesc').value.trim()||null,amount:amt,reimbursed:false,notes:document.getElementById('mNo').value.trim()||null});
      if(r.error)throw r.error;
    }
  );
}

async function delRec(table,id,cb){
  if(!confirm('Delete this record?'))return;
  var r=await sb.from(table).delete().eq('id',id);
  if(r.error){showErr(r.error.message);return;}
  await loadAll();
  if(cb)cb();else showTab(currentTab);
}

async function doReimb(xid,eid){
  var r=await sb.from('expenses').update({reimbursed:true}).eq('id',xid);
  if(r.error){showErr(r.error.message);return;}
  await loadAll();
  if(eid)openEvDetail(eid);else showTab('expenses');
}

init();
</script>
