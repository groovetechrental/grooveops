<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrooveOps</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e12;--surface:#17171f;--surface2:#1e1e2a;--border:#2a2a3a;--accent:#9c6fe4;--accent2:#e05c5c;--green:#4caf50;--blue:#4fc3f7;--text:#e8e8f0;--muted:#6b6b80;--radius:12px;--gt:#f5a623;--looch:#e05c5c;--neon:#b39ddb;--other:#6b6b80;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 24px;width:100%;max-width:360px;}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:3px;color:var(--accent);margin-bottom:4px;}
.login-logo span{color:var(--text);}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.login-err{background:rgba(224,92,92,.12);border:1px solid rgba(224,92,92,.35);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--accent2);margin-bottom:14px;display:none;}
.login-err.show{display:block;}
#app{display:none;}
.form-group{margin-bottom:13px;}
label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
input:not([type=checkbox]):not([type=radio]),textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:9px 12px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
input:focus,textarea:focus,select:focus{border-color:var(--accent);}
textarea{resize:vertical;min-height:56px;}
select option{background:var(--surface2);color:var(--text);}
.btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:opacity .15s;white-space:nowrap;}
.btn:hover{opacity:.85;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-full{width:100%;}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);opacity:1;}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-danger{background:var(--accent2);color:#fff;}
.sp{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s;}
.loading-overlay.hidden{opacity:0;pointer-events:none;}
.loading-logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:var(--accent);}
.loading-logo span{color:var(--text);}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent);}
.logo span{color:var(--text);}
.header-right{display:flex;align-items:center;gap:8px;}
.user-chip{font-size:11px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.btn-hdr{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:opacity .15s;}
.btn-hdr:hover{opacity:.85;}
.btn-hdr.outline{background:transparent;color:var(--muted);border:1px solid var(--border);}
.btn-hdr.outline:hover{border-color:var(--accent2);color:var(--accent2);opacity:1;}
.nav-tabs{display:flex;gap:2px;padding:10px 16px 0;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto;}
.nav-tab{padding:8px 14px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.content{padding:16px;max-width:960px;margin:0 auto;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.stat-value{font-size:22px;font-weight:600;color:var(--text);}
.stat-value.green{color:var(--green);}
.stat-value.amber{color:var(--accent);}
.stat-value.red{color:var(--accent2);}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1.5px;color:var(--accent);}
.tbl{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;}
.tbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2);}
.tbl td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--surface2);}
.acts{display:flex;gap:6px;flex-wrap:wrap;}
.badge{display:inline-block;font-size:10px;font-weight:700;border-radius:20px;padding:2px 8px;}
.bg{background:rgba(76,175,80,.15);color:var(--green);border:1px solid rgba(76,175,80,.3);}
.ba{background:rgba(156,111,228,.15);color:var(--accent);border:1px solid rgba(156,111,228,.3);}
.br{background:rgba(224,92,92,.12);color:var(--accent2);border:1px solid rgba(224,92,92,.3);}
.bb{background:rgba(79,195,247,.12);color:var(--blue);border:1px solid rgba(79,195,247,.3);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;overflow-y:auto;padding:16px;}
.modal-overlay.open{display:block;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:560px;margin:20px auto 60px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;margin-bottom:16px;color:var(--accent);}
.modal-actions{display:flex;gap:10px;margin-top:18px;}
.modal-actions .btn{flex:1;padding:12px;}
.empty{text-align:center;padding:24px;color:var(--muted);}
.err-banner{background:rgba(224,92,92,.1);border:1px solid rgba(224,92,92,.3);color:var(--accent2);font-size:12px;padding:8px 16px;display:none;align-items:center;gap:8px;justify-content:space-between;}
.err-banner.show{display:flex;}
.err-banner button{background:none;border:none;color:var(--accent2);cursor:pointer;font-size:16px;}
.dp{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
.dp-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;}
.dr{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.dr:last-child{border-bottom:none;}
.dr .l{color:var(--muted);}
.dr .v{font-weight:500;text-align:right;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.back{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);cursor:pointer;margin-bottom:16px;transition:color .15s;}
.back:hover{color:var(--accent);}
.new-cust{display:none;margin-top:10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;}
.new-cust-title{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cal-month{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;}
.cal-nav-btns{display:flex;gap:6px;align-items:center;}
.nav-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;width:32px;height:32px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.nav-btn:hover{background:var(--border);}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);}
.leg-dot{width:9px;height:9px;border-radius:2px;}
.day-headers{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px;}
.day-hdr{text-align:center;font-size:10px;font-weight:600;color:var(--muted);padding:3px 0;text-transform:uppercase;letter-spacing:.5px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-cell{background:var(--surface);border:1px solid var(--border);border-radius:7px;min-height:80px;padding:5px 4px;cursor:pointer;transition:border-color .15s;overflow:hidden;}
.cal-cell:hover{border-color:var(--accent);}
.cal-cell.other-month{opacity:.35;}
.cal-cell.today{border-color:var(--accent);}
.cal-cell.today .date-num{color:var(--accent);font-weight:700;}
.cal-cell.holiday-cell{background:#1a1a14;}
.date-num{font-size:11px;font-weight:500;margin-bottom:2px;}
.hol-lbl{font-size:7px;color:var(--accent);font-weight:600;opacity:.75;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;letter-spacing:.3px;}
.ev-chip{font-size:8px;border-radius:3px;padding:1px 3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;font-weight:600;display:block;color:#000;line-height:1.4;}
.ev-chip.gt{background:var(--gt);}
.ev-chip.looch{background:var(--looch);}
.ev-chip.neon{background:var(--neon);}
.ev-chip.other{background:var(--other);color:var(--text);}
.crew-hint{font-size:7px;color:var(--blue);opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px;line-height:1.3;}
.more-ind{font-size:7px;color:var(--muted);}
.ev-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;border-left:4px solid var(--gt);overflow:hidden;}
.ev-card.looch-type{border-left-color:var(--looch);}
.ev-card.neon-type{border-left-color:var(--neon);}
.ev-card.other-type{border-left-color:var(--other);}
.ev-card-sum{display:flex;align-items:flex-start;justify-content:space-between;padding:11px 13px;cursor:pointer;gap:10px;}
.ev-card-sum:hover{background:var(--surface2);}
.ev-card-left{flex:1;min-width:0;}
.ev-card-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-card-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.ev-card-crew{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;}
.crew-pill{font-size:10px;border-radius:20px;padding:2px 8px;font-weight:600;display:inline-flex;align-items:center;gap:4px;}
.crew-pill.conf{background:rgba(76,175,80,.15);color:var(--green);border:1px solid rgba(76,175,80,.35);}
.crew-pill.unconf{background:rgba(224,92,92,.1);color:var(--accent2);border:1px solid rgba(224,92,92,.3);}
.pill-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}
.expand-arrow{color:var(--muted);font-size:11px;transition:transform .2s;margin-top:2px;flex-shrink:0;}
.ev-card.expanded .expand-arrow{transform:rotate(180deg);}
.ev-card-detail{display:none;border-top:1px solid var(--border);padding:14px;}
.ev-card.expanded .ev-card-detail{display:block;}
.type-sel{display:flex;gap:5px;flex-wrap:wrap;}
.stage-inquiry{background:rgba(79,195,247,.15);color:#0288d1;border:1px solid rgba(79,195,247,.3);}
.stage-contacted{background:rgba(255,213,79,.15);color:#f9a825;border:1px solid rgba(255,213,79,.3);}
.stage-qualified{background:rgba(255,152,0,.15);color:#e65100;border:1px solid rgba(255,152,0,.3);}
.stage-proposal{background:rgba(179,157,219,.15);color:#7c4dff;border:1px solid rgba(179,157,219,.3);}
.stage-booked{background:rgba(76,175,80,.15);color:#2e7d32;border:1px solid rgba(76,175,80,.3);}
.stage-completed{background:rgba(120,144,156,.15);color:#546e7a;border:1px solid rgba(120,144,156,.3);}
.stage-lost{background:rgba(239,83,80,.15);color:#c62828;border:1px solid rgba(239,83,80,.3);}
.pipeline-col{background:var(--surface2);border-radius:10px;padding:12px;min-width:160px;flex:1;}
.pipeline-col-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.pipeline-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
.pipeline-card:hover{border-color:var(--accent);}
.pipeline-card-name{font-weight:600;font-size:13px;margin-bottom:3px;}
.pipeline-card-meta{font-size:11px;color:var(--muted);}
.interaction-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.interaction-item:last-child{border-bottom:none;}
.interaction-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--surface2);}
.interaction-body{flex:1;}
.interaction-meta{font-size:11px;color:var(--muted);margin-bottom:3px;}
.interaction-notes{font-size:13px;line-height:1.5;}
.last-contact-green{color:var(--green);}
.last-contact-amber{color:var(--amber,#f9a825);}
.last-contact-red{color:var(--accent2);}
.crm-view-toggle{display:flex;gap:6px;margin-bottom:16px;}
.crm-view-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-weight:600;}
.crm-view-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}min-width:60px;padding:7px 4px;border-radius:8px;border:2px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;}
.type-opt.active.gt{border-color:var(--gt);color:var(--gt);background:rgba(245,166,35,.1);}
.type-opt.active.looch{border-color:var(--looch);color:var(--looch);background:rgba(224,92,92,.1);}
.type-opt.active.neon{border-color:var(--neon);color:var(--neon);background:rgba(179,157,219,.1);}
.type-opt.active.other{border-color:var(--muted);color:var(--text);background:rgba(107,107,128,.15);}
.labor-col-hdr{display:grid;gap:5px;grid-template-columns:1fr 60px 72px 32px;margin-bottom:4px;padding:0 2px;}
.labor-col-hdr span{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.labor-row{display:grid;gap:5px;align-items:center;grid-template-columns:1fr 60px 72px 32px;margin-bottom:5px;}
.labor-row select,.labor-row input[type=text]{font-size:13px;padding:7px 9px;}
.conf-toggle{border-radius:6px;border:1px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;padding:0 6px;height:34px;transition:all .15s;white-space:nowrap;}
.conf-toggle.off{color:var(--muted);}
.conf-toggle.on{color:var(--green);border-color:rgba(76,175,80,.5);background:rgba(76,175,80,.1);}
.equip-col-hdr{display:grid;gap:5px;grid-template-columns:1fr 72px 32px;margin-bottom:4px;padding:0 2px;}
.equip-col-hdr span{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.equip-row{display:grid;gap:5px;align-items:center;grid-template-columns:1fr 72px 32px;margin-bottom:5px;}
.row-remove{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;width:32px;height:34px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.row-remove:hover{border-color:var(--accent2);color:var(--accent2);}
.add-row-btn{background:transparent;border:1px dashed var(--border);color:var(--muted);border-radius:8px;padding:7px 12px;width:100%;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;transition:all .15s;text-align:left;margin-bottom:8px;}
.add-row-btn:hover{border-color:var(--accent);color:var(--accent);}
.crew-chip-dp{font-size:12px;padding:3px 10px;border-radius:20px;display:inline-block;margin:3px;}
/* PERIOD SELECTOR */
.period-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.period-bar select{width:auto;padding:6px 10px;font-size:13px;}
.period-label{font-size:12px;color:var(--muted);}
/* PACKING LIST */
.pack-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:300;overflow-y:auto;padding:16px;}
.pack-overlay.open{display:block;}
.pack-modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;width:100%;max-width:640px;margin:20px auto 60px;}
.pack-section{margin-bottom:20px;}
.pack-section-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.2px;color:var(--blue);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.pack-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .15s;margin-bottom:4px;}
.pack-item:hover{background:var(--surface2);}
.pack-item.checked{opacity:.5;}
.pack-item.checked .pack-name{text-decoration:line-through;}
.pack-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.pack-item.checked .pack-check{background:var(--green);border-color:var(--green);color:#fff;}
.pack-name{font-size:14px;font-weight:500;flex:1;}
.pack-qty{font-size:12px;color:var(--muted);flex-shrink:0;}
.pack-progress{background:var(--surface2);border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.pack-bar-wrap{flex:1;background:var(--border);border-radius:4px;height:8px;overflow:hidden;}
.pack-bar{height:8px;background:var(--green);border-radius:4px;transition:width .3s;}
.pack-pct{font-size:13px;font-weight:600;color:var(--green);flex-shrink:0;}
/* EQUIPMENT CATALOG */
.eq-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden;}
.eq-card-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;}
.eq-card-head:hover{background:var(--surface2);}
.eq-card-name{font-weight:600;font-size:14px;}
.eq-card-body{display:none;border-top:1px solid var(--border);padding:12px 14px;}
.eq-card.open .eq-card-body{display:block;}
.eq-card.open .expand-arrow{transform:rotate(180deg);}
.comp-row{display:grid;grid-template-columns:1fr 80px 80px auto;gap:8px;align-items:center;margin-bottom:6px;}
.comp-row input{font-size:13px;padding:6px 10px;}
</style>
</head>
<body>

<div class="loading-overlay" id="lo">
  <div class="loading-logo">Groove<span>Ops</span></div>
  <div class="spinner"></div>
</div>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Groove<span>Ops</span></div>
    <div class="login-sub">Owner access only</div>
    <div class="login-err" id="lerr"></div>
    <div class="form-group"><label>Email</label><input type="email" id="lEmail" placeholder="you@example.com" autocomplete="email"></div>
    <div class="form-group"><label>Password</label><input type="password" id="lPass" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-full" id="loginBtn" onclick="doLogin()">Sign In</button>
  </div>

  var y=parseInt(selectedPeriod);

function inPeriod(d){var r=getPeriodRange();return d>=r.start&&d<=r.end;}

function buildGCalDesc(ev){
  var crew=(ev.labor||[]).filter(function(x){return x.name;});
  var main=(ev.main_equip||[]).filter(function(x){return x.name;});
  var sec=(ev.sec_equip||[]).filter(function(x){return x.name;});
  var lines=[];
  lines.push('Date: '+fmtD(ev.date));
  if(ev.time)lines.push('Time: '+ev.time);
  if(ev.venue)lines.push('Venue: '+ev.venue);
  lines.push('Type: '+(TYPE_LABELS[ev.type]||ev.type||'—'));
  if(crew.length){lines.push('');lines.push('Crew:');crew.forEach(function(p){lines.push('  '+(p.confirmed?'✓':'?')+' '+p.name+(p.qty?' ('+p.qty+' hrs)':''));});}
  if(main.length){lines.push('');lines.push('Main Equipment:');main.forEach(function(i){lines.push('  '+i.name+(i.qty?' x'+i.qty:''));});}
  if(sec.length){lines.push('');lines.push('Secondary Equipment:');sec.forEach(function(i){lines.push('  '+i.name+(i.qty?' x'+i.qty:''));});}
  if(ev.notes){lines.push('');lines.push('Notes: '+ev.notes);}
  if(ev.invoice_amount)lines.push('Invoice: $'+parseFloat(ev.invoice_amount).toFixed(2));
  return lines.join('\n');
}
function syncToGCal(ev,isEdit){
  fetch(MAKE_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:ev.name,date:ev.date,venue:ev.venue||'',type:ev.type,description:buildGCalDesc(ev),isEdit:!!isEdit})}).catch(function(e){console.warn('GCal sync failed:',e);});
}

function toCSV(headers,rows){
  var lines=[headers.map(function(h){return'"'+h+'"';}).join(',')];
  rows.forEach(function(row){lines.push(row.map(function(c){return'"'+String(c==null?'':c).replace(/"/g,'""')+'"';}).join(','));});
  return lines.join('\r\n');
}
function downloadCSV(filename,csv){
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}

function getHolidays(year){
  var h={};
  function add(m,d,n){h[year+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0')]=n;}
  add(1,1,"New Year's Day");add(6,19,"Juneteenth");add(7,4,"Independence Day");add(11,11,"Veterans Day");add(12,25,"Christmas");add(12,31,"New Year's Eve");add(2,14,"Valentine's Day");add(10,31,"Halloween");add(3,17,"St. Patrick's Day");
  function nth(mo,dow,n){var d=1,c=0;while(true){if(new Date(year,mo-1,d).getDay()===dow){c++;if(c===n)return[mo,d];}d++;}}
  function last(mo,dow){var l=new Date(year,mo,0).getDate();for(var d=l;d>=1;d--){if(new Date(year,mo-1,d).getDay()===dow)return[mo,d];}}
  var t;t=nth(1,1,3);add(t[0],t[1],"MLK Day");t=nth(2,1,3);add(t[0],t[1],"Presidents Day");t=last(5,1);add(t[0],t[1],"Memorial Day");t=nth(9,1,1);add(t[0],t[1],"Labor Day");t=nth(10,1,2);add(t[0],t[1],"Columbus Day");t=nth(11,4,4);add(t[0],t[1],"Thanksgiving");t=nth(5,0,2);add(t[0],t[1],"Mother's Day");t=nth(6,0,3);add(t[0],t[1],"Father's Day");
  return h;
}

function renderEvents(){
  var filtered=filterByPeriod(C.events,'date');
  var sorted=filtered.slice().sort(function(a,b){
    var av,bv;
    if(evSort.col==='date'){av=a.date||'';bv=b.date||'';}
    else if(evSort.col==='name'){av=(a.name||'').toLowerCase();bv=(b.name||'').toLowerCase();}
    else if(evSort.col==='venue'){av=(a.venue||'').toLowerCase();bv=(b.venue||'').toLowerCase();}
    else if(evSort.col==='customer'){av=cuName(a.customer_id).toLowerCase();bv=cuName(b.customer_id).toLowerCase();}
    else if(evSort.col==='invoice'){av=parseFloat(a.invoice_amount)||0;bv=parseFloat(b.invoice_amount)||0;}
    else if(evSort.col==='hours'){
      var aH=C.labor.filter(function(l){return sid(l.event_id)===sid(a.id);}).reduce(function(s,l){return s+(parseFloat(l.hours)||0);},0)||((a.labor||[]).reduce(function(s,x){return s+(parseFloat(x.qty)||0);},0));
      var bH=C.labor.filter(function(l){return sid(l.event_id)===sid(b.id);}).reduce(function(s,l){return s+(parseFloat(l.hours)||0);},0)||((b.labor||[]).reduce(function(s,x){return s+(parseFloat(x.qty)||0);},0));
      // N/A always sorts after 0h: use -1 as sentinel so it's distinct
      av=a.hours_na?-1:aH; bv=b.hours_na?-1:bH;
      // N/A should always be last regardless of direction
      if(a.hours_na&&!b.hours_na)return 1;
      if(!a.hours_na&&b.hours_na)return-1;
    }
    else if(evSort.col==='profit'){av=evFin(a.id).profit;bv=evFin(b.id).profit;}
    else if(evSort.col==='status'){av=a.status||'';bv=b.status||'';}
    if(av<bv)return-1*evSort.dir;if(av>bv)return 1*evSort.dir;return 0;
  });
  function th(lbl,col){var arrow=evSort.col===col?(evSort.dir===1?' ↑':' ↓'):'';return'<th style="cursor:pointer;user-select:none" onclick="sortEv(\''+col+'\')">'+lbl+arrow+'</th>';}
  var today=todayStr();
  var upcomingCount=filtered.filter(function(e){return e.date>=today&&e.status!=='cancelled'&&e.status!=='completed';}).length;
  var pastCount=filtered.length-upcomingCount;
  var countLabel=upcomingCount?pastCount+' in period + '+upcomingCount+' upcoming':String(filtered.length);
  document.getElementById('mc').innerHTML=
    periodSelector()+
    sh('Events ('+countLabel+')',exportBtn('exportEvents')+'<button class="btn btn-sm" onclick="openEvModal()">+ Add Event</button>')+
    '<table class="tbl"><thead><tr>'+th('Event','name')+th('Date','date')+th('Venue','venue')+th('Type','type')+th('Customer','customer')+th('Invoice','invoice')+th('Hours','hours')+th('Profit','profit')+'<th></th></tr></thead><tbody>'+
    (sorted.map(function(e){
      var f=evFin(e.id);
      var lh=C.labor.filter(function(l){return sid(l.event_id)===sid(e.id);}).reduce(function(s,l){return s+(parseFloat(l.hours)||0);},0);
      var ch=(e.labor||[]).filter(function(x){return x.name&&x.qty;}).reduce(function(s,x){return s+(parseFloat(x.qty)||0);},0);
      var totalHours=lh||ch;
      var hoursDisplay=e.hours_na?'<span style="color:var(--muted);font-size:11px">N/A</span>':(totalHours>0?totalHours+'h':'<span style="color:var(--accent2);font-weight:600;font-size:11px">0h</span>');
      return'<tr style="cursor:pointer" onclick="openEvDetail(\''+sid(e.id)+'\',\'events\')">'+
        '<td style="font-weight:500">'+esc(e.name)+'</td><td>'+fmtD(e.date)+'</td>'+
        '<td style="color:var(--muted)">'+esc(e.venue||'—')+'</td>'+
        '<td><span class="badge '+(e.type==='gt'?'ba':e.type==='looch'?'br':e.type==='neon'?'bb':'')+'">'+( TYPE_LABELS[e.type||'other']||e.type||'—')+'</span></td>'+
        '<td>'+cuName(e.customer_id)+'</td>'+
        '<td>'+(e.invoice_amount?fmt(e.invoice_amount):'<span style="color:var(--muted)">—</span>')+'</td>'+
        '<td>'+hoursDisplay+'</td>'+
        '<td style="color:'+(f.profit>=0?'var(--green)':'var(--accent2)')+'">'+fmt(f.profit)+'</td>'+
        '<td onclick="event.stopPropagation()"><div class="acts">'+
          '<button class="btn btn-sm btn-outline" onclick="openEvModal(\''+sid(e.id)+'\')">Edit</button>'+
          (hasPackingList(e)?'<button class="btn btn-sm" onclick="openPackingList(\''+sid(e.id)+'\')" style="background:var(--blue);color:#000;font-size:11px">📦</button>':'')+
          '<button class="btn btn-sm btn-danger" onclick="delRec(\'events\',\''+sid(e.id)+'\')">Del</button>'+
        '</div></td></tr>';
    }).join('')||'<tr><td colspan="9" class="empty">No events in this period</td></tr>')+
    '</tbody></table>';
}

function getLabDate(l){var e=findEv(l.event_id);return e?e.date:'';}
function sortLabArr(arr){
  return arr.slice().sort(function(a,b){
    var av,bv;
    if(laborSort.col==='date'){av=getLabDate(a);bv=getLabDate(b);}
    else if(laborSort.col==='event'){av=evName(a.event_id).toLowerCase();bv=evName(b.event_id).toLowerCase();}
    else if(laborSort.col==='venue'){var ea=findEv(a.event_id),eb=findEv(b.event_id);av=(ea&&ea.venue||'').toLowerCase();bv=(eb&&eb.venue||'').toLowerCase();}
    else if(laborSort.col==='person'){av=(a.person||'').toLowerCase();bv=(b.person||'').toLowerCase();}
    else if(laborSort.col==='hours'){av=parseFloat(a.hours)||0;bv=parseFloat(b.hours)||0;}
    else if(laborSort.col==='earned'){av=parseFloat(a.total_amount)||((parseFloat(a.hours)||0)*(parseFloat(a.rate)||OWNER_RATE));bv=parseFloat(b.total_amount)||((parseFloat(b.hours)||0)*(parseFloat(b.rate)||OWNER_RATE));}
    if(av<bv)return-1*laborSort.dir;if(av>bv)return 1*laborSort.dir;return 0;
  });
}
function sortLab(col){if(laborSort.col===col){laborSort.dir*=-1;}else{laborSort.col=col;laborSort.dir=-1;}renderLabor();}
function lth(lbl,col){var arrow=laborSort.col===col?(laborSort.dir===1?' ↑':' ↓'):'';return'<th style="cursor:pointer;user-select:none" onclick="sortLab(\''+col+'\')">'+lbl+arrow+'</th>';}

function ownerStats(person){

function renderExpenses(){
  function ths(lbl,col){var arrow=expSort.col===col?(expSort.dir===1?' ↑':' ↓'):'';return'<th style="cursor:pointer;user-select:none" onclick="sortExp(\''+col+'\')">'+lbl+arrow+'</th>';}
  var filtered=filterByPeriod(C.expenses,'date');
  var sorted=filtered.slice().sort(function(a,b){
    var av,bv;
    if(expSort.col==='date'){av=a.date||'';bv=b.date||'';}
    else if(expSort.col==='event'){av=evName(a.event_id).toLowerCase();bv=evName(b.event_id).toLowerCase();}
    else if(expSort.col==='person'){av=(a.person||'').toLowerCase();bv=(b.person||'').toLowerCase();}
    else if(expSort.col==='category'){av=(a.category||'').toLowerCase();bv=(b.category||'').toLowerCase();}
    else if(expSort.col==='amount'){av=parseFloat(a.amount)||0;bv=parseFloat(b.amount)||0;}
    if(av<bv)return-1*expSort.dir;if(av>bv)return 1*expSort.dir;return 0;
  });
  var te=filtered.reduce(function(s,x){return s+(parseFloat(x.amount)||0);},0);
  var ur=filtered.filter(function(x){return!x.reimbursed;}).reduce(function(s,x){return s+(parseFloat(x.amount)||0);},0);
  document.getElementById('mc').innerHTML=
    periodSelector()+
    '<div class="stat-grid" style="margin-bottom:16px">'+sc('Total Expenses',fmt(te))+sc('Pending Reimbursement',fmt(ur),'amber')+'</div>'+
    sh('Expenses ('+filtered.length+')',exportBtn('exportExpenses')+'<button class="btn btn-sm" onclick="openExpModal()">+ Add Expense</button>')+
    '<table class="tbl"><thead><tr>'+ths('Date','date')+ths('Event','event')+ths('Person','person')+ths('Category','category')+'<th>Description</th>'+ths('Amount','amount')+'<th>Reimbursed</th><th></th></tr></thead><tbody>'+
    (sorted.map(function(x){return'<tr><td>'+fmtD(x.date)+'</td><td style="font-weight:500">'+(x.event_id?evName(x.event_id):'<span style="color:var(--muted)">—</span>')+'</td><td style="text-transform:capitalize">'+esc(x.person||'—')+'</td><td><span class="badge bb">'+esc(x.category||'other')+'</span></td><td>'+esc(x.description||'—')+'</td><td>'+fmt(x.amount)+'</td><td><span class="badge '+(x.reimbursed?'bg':'ba')+'">'+(x.reimbursed?'Yes':'No')+'</span></td><td><div class="acts">'+(x.reimbursed?'':'<button class="btn btn-sm btn-outline" onclick="doReimb(\''+sid(x.id)+'\')">✓</button>')+'<button class="btn btn-sm btn-outline" onclick="openExpModal(null,\''+sid(x.id)+'\')">Edit</button><button class="btn btn-sm btn-danger" onclick="delRec(\'expenses\',\''+sid(x.id)+'\')">Del</button></div></td></tr>';}).join('')||'<tr><td colspan="8" class="empty">No expenses in this period</td></tr>')+
    '</tbody></table>';
}
function sortExp(col){if(expSort.col===col){expSort.dir*=-1;}else{expSort.col=col;expSort.dir=1;}renderExpenses();}

function hasPackingList(e){
  var main=(e.main_equip||[]).filter(function(x){return x.name;});
  return main.some(function(x){return C.equipItems.find(function(i){return i.name.toLowerCase()===x.name.toLowerCase();});});
}

function openPackingList(eventId){
  var e=findEv(eventId);if(!e)return;
  currentPackEventId=eventId;
  document.getElementById('packTitle').textContent='📦 Packing List — '+e.name+' ('+fmtD(e.date)+')';
  renderPackingList();
  document.getElementById('packOverlay').classList.add('open');
}
function closePackingList(){document.getElementById('packOverlay').classList.remove('open');currentPackEventId=null;}

function renderPackingList(){
  var e=findEv(currentPackEventId);if(!e)return;
  var main=(e.main_equip||[]).filter(function(x){return x.name;});
  var sections=[],totalComps=0,checkedComps=0;
  main.forEach(function(equip){
    var item=C.equipItems.find(function(i){return i.name.toLowerCase()===equip.name.toLowerCase();});
    if(!item)return;
    var qty=parseFloat(equip.qty)||1;
    var comps=C.equipComponents.filter(function(c){return c.equipment_item_id===item.id;}).sort(function(a,b){return(a.sort_order||0)-(b.sort_order||0);});
    if(!comps.length)return;
    var compRows=comps.map(function(c){
      var check=C.packChecks.find(function(pc){return sid(pc.event_id)===sid(currentPackEventId)&&pc.component_id===c.id;});
      var isChecked=check&&check.checked;
      totalComps++;if(isChecked)checkedComps++;
      var compQty=c.quantity?Math.ceil(c.quantity*qty)+' '+(c.unit||''):((c.unit||'')+(qty>1?' × '+qty:''));
      return'<div class="pack-item'+(isChecked?' checked':'')+'" onclick="togglePackCheck(\''+c.id+'\')">'+
        '<div class="pack-check">'+(isChecked?'✓':'')+'</div>'+
        '<div class="pack-name">'+esc(c.name)+'</div>'+
        '<div class="pack-qty">'+esc(compQty)+'</div>'+
      '</div>';
    }).join('');
    sections.push('<div class="pack-section"><div class="pack-section-title">'+esc(item.name)+(qty>1?' × '+qty:'')+'</div>'+compRows+'</div>');
  });
  var pct=totalComps>0?Math.round((checkedComps/totalComps)*100):0;
  document.getElementById('packProgress').innerHTML=
    '<div class="pack-progress">'+
      '<div style="font-size:13px;color:var(--muted)">'+checkedComps+' of '+totalComps+' items packed</div>'+
      '<div class="pack-bar-wrap"><div class="pack-bar" style="width:'+pct+'%"></div></div>'+
      '<div class="pack-pct">'+pct+'%</div>'+
    '</div>';
  document.getElementById('packBody').innerHTML=
    (e.notes?'<div style="background:var(--surface2);border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13px;color:var(--text);border-left:3px solid var(--accent)"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:4px">Event Notes</div>'+esc(e.notes)+'</div>':'')+
    (sections.length?sections.join(''):'<div class="empty">No equipment with components found for this event.<br>Make sure equipment names match your catalog exactly.</div>');
}

async function togglePackCheck(componentId){
  var e=findEv(currentPackEventId);if(!e)return;
  var existing=C.packChecks.find(function(pc){return sid(pc.event_id)===sid(currentPackEventId)&&pc.component_id===componentId;});
  var session=await sb.auth.getSession();
  var userEmail=session&&session.data&&session.data.session?session.data.session.user.email:'';
  if(existing){
    var newVal=!existing.checked;
    var r=await sb.from('packing_list_checks').update({checked:newVal,checked_by:newVal?userEmail:null,checked_at:newVal?new Date().toISOString():null}).eq('id',existing.id);
    if(r.error){showErr(r.error.message);return;}
    existing.checked=newVal;existing.checked_by=newVal?userEmail:null;
  } else {
    var r2=await sb.from('packing_list_checks').insert({event_id:currentPackEventId,component_id:componentId,checked:true,checked_by:userEmail,checked_at:new Date().toISOString()}).select().single();
    if(r2.error){showErr(r2.error.message);return;}
    C.packChecks.push(r2.data);
  }
  renderPackingList();
}

async function resetPackingList(){
  if(!confirm('Reset all checks for this event?'))return;
  var r=await sb.from('packing_list_checks').update({checked:false,checked_by:null,checked_at:null}).eq('event_id',currentPackEventId);
  if(r.error){showErr(r.error.message);return;}
  C.packChecks.forEach(function(pc){if(sid(pc.event_id)===sid(currentPackEventId))pc.checked=false;});
  renderPackingList();
}

  document.getElementById('mt').textContent=title;
  document.getElementById('mb').innerHTML=bodyHtml;
  document.getElementById('msb').textContent=saveLabel||'Save';
  document.getElementById('msb').disabled=false;
  _modalSaveFn=saveFn;
  document.getElementById('mo').classList.add('open');
}
function closeModal(){document.getElementById('mo').classList.remove('open');_modalSaveFn=null;}
function modalSave(){if(_modalSaveFn)_modalSaveFn();}
function gv(id){var el=document.getElementById(id);return el?el.value.trim():'';}

function crewRowHtml(name,hrs,confirmed){
  var knownCrew=['John','Steve','JP'];
  var isCustom=name&&!knownCrew.map(function(n){return n.toLowerCase();}).includes((name||'').toLowerCase());
  var selHtml='<select class="crew-name-sel" onchange="handleCrewSel(this)" style="'+(isCustom?'display:none':'width:100%')+'">'+
    '<option value="">\u2014 select \u2014</option>'+
    knownCrew.map(function(n){return'<option value="'+n+'"'+((!isCustom&&name&&name.toLowerCase()===n.toLowerCase())?' selected':'')+'>'+n+'</option>';}).join('')+
    '<option value="__custom__">Other / Custom\u2026</option>'+
    '</select>'+
    '<input class="crew-name" placeholder="Type name\u2026" value="'+esc(isCustom?name:'')+'" style="'+(isCustom?'width:100%':'display:none')+'">';
  return'<div class="crew-row" style="display:grid;grid-template-columns:1fr 80px 110px 32px;gap:6px;margin-bottom:6px;align-items:center">'+
    '<div>'+selHtml+'</div>'+
    '<input type="number" class="crew-hrs" value="'+hrs+'" step="0.5" placeholder="Hrs">'+
    '<button type="button" class="crew-conf-btn btn btn-sm" style="background:'+(confirmed?'rgba(76,175,80,.2)':'var(--surface2)')+';color:'+(confirmed?'var(--green)':'var(--muted)')+';border:1px solid '+(confirmed?'rgba(76,175,80,.4)':'var(--border)')+';" onclick="toggleCrewConf(this)">'+(confirmed?'\u2713 Yes':'? TBD')+'</button>'+
    '<button type="button" onclick="this.closest(\'.crew-row\').remove()" style="background:var(--accent2);color:#fff;border:none;border-radius:6px;cursor:pointer;width:32px;height:34px;font-size:16px;line-height:1">\u00d7</button>'+
  '</div>';
}
function handleCrewSel(sel){
  var wrap=sel.parentNode;
  var input=wrap.querySelector('.crew-name');
  if(sel.value==='__custom__'){
    sel.style.display='none';
    input.style.display='block';
    input.style.width='100%';
    input.value='';
    input.focus();
  }
}
function toggleCrewConf(btn){
  var isConf=btn.textContent.trim().startsWith('✓');
  btn.textContent=isConf?'? TBD':'✓ Yes';
  btn.style.background=isConf?'var(--surface2)':'rgba(76,175,80,.2)';
  btn.style.color=isConf?'var(--muted)':'var(--green)';
  btn.style.borderColor=isConf?'var(--border)':'rgba(76,175,80,.4)';
}

function collectCrew(){

    var sel=row.querySelector('.crew-name-sel');
    var input=row.querySelector('.crew-name');
    var name=sel&&sel.style.display!=='none'?sel.value:input.value;
    name=(name||'').trim();

    return{name:name,qty:parseFloat(row.querySelector('.crew-hrs').value)||null,confirmed:row.querySelector('.crew-conf-btn').textContent.trim().startsWith('\u2713')};

async function syncCrewToLabor(eventId, crew){
  if(!eventId||!crew||!crew.length)return;
  var owners=['john','steve'];
  for(var i=0;i<crew.length;i++){
    var c=crew[i];
    if(!c.name)continue;
    var personKey=c.name.toLowerCase();
    var isOwner=owners.includes(personKey);
    var hrs=parseFloat(c.qty)||null;
    var earned=isOwner&&hrs?(hrs*OWNER_RATE):null;
    var existing=C.labor.find(function(l){return sid(l.event_id)===sid(eventId)&&l.person===personKey;});
    if(existing){
      if(existing.hours!==hrs){
        var upd=isOwner?{hours:hrs,total_amount:earned}:{hours:hrs};
        await sb.from('labor').update(upd).eq('id',existing.id);
      }
    } else {
      var newRec={person:personKey,event_id:eventId,hours:hrs,notes:null};
      if(isOwner){newRec.rate=OWNER_RATE;newRec.total_amount=earned;}
      else{newRec.paid=false;newRec.total_amount=null;}
      await sb.from('labor').insert(newRec);
    }
  }
  // Remove labor records for crew members no longer in the list
  var crewNames=crew.map(function(c){return c.name.toLowerCase();});
  var toRemove=C.labor.filter(function(l){
    return sid(l.event_id)===sid(eventId)&&!crewNames.includes(l.person);
  });
  for(var j=0;j<toRemove.length;j++){
    await sb.from('labor').delete().eq('id',toRemove[j].id);
  }
}

async function syncLaborToEventCrew(eventId, person, hours){
  if(!eventId)return;
  var ev=C.events.find(function(e){return sid(e.id)===sid(eventId);});
  if(!ev)return;
  var crew=(ev.labor||[]).slice();
  var personName=person.charAt(0).toUpperCase()+person.slice(1);
  var existing=crew.find(function(c){return c.name&&c.name.toLowerCase()===person.toLowerCase();});
  if(existing){
    existing.qty=hours||null;
  } else {
    crew.push({name:personName,qty:hours||null,confirmed:true});
  }
  await sb.from('events').update({labor:crew}).eq('id',eventId);
}
async function saveEv(id){
  var name=gv('mEvName'),date=gv('mEvDate'),time=gv('mEvTime'),venue=gv('mEvVenue'),type=gv('mEvType'),status=gv('mEvStatus'),cuRaw=gv('mEvCu'),inv=gv('mEvInv'),notes=gv('mEvNotes');
  var hoursNA=document.getElementById('mEvHoursNA')?document.getElementById('mEvHoursNA').checked:false;
  if(!name||!date){showErr('Name and date required.');return;}
  var cuId=cuRaw==='__new__'?await quickAddCu():cuRaw||null;
  var obj={name:name,date:date,time:time||null,venue:venue||null,type:type,status:status,customer_id:cuId,invoice_amount:inv?parseFloat(inv):null,notes:notes||null,hours_na:hoursNA,
    labor:collectCrew(),main_equip:collectEquip('mainEquipWrap'),sec_equip:collectEquip('secEquipWrap')};
  var r=id?await sb.from('events').update(obj).eq('id',id):await sb.from('events').insert(obj);
  if(r.error){showErr(r.error.message);return;}
  var savedId=id||(r.data&&r.data[0]&&r.data[0].id);
  if(!savedId){var fe=await sb.from('events').select('id').eq('name',name).order('created_at',{ascending:false}).limit(1);savedId=fe.data&&fe.data[0]&&fe.data[0].id;}
  await loadAll();
  if(savedId)await syncCrewToLabor(savedId,obj.labor||[]);
  syncToGCal(obj,!!id);
  closeModal();await loadAll();showTab('events');
}

async function saveLab(){
  var per=gv('mLbPer'),ev=gv('mLbEv'),hrs=gv('mLbHrs'),rate=gv('mLbRate'),notes=gv('mLbNotes');
  if(!per||!hrs){showErr('Person and hours required.');return;}
  var h=parseFloat(hrs),r2=rate?parseFloat(rate):OWNER_RATE;
  var obj={person:per,event_id:ev||null,hours:h,rate:r2,total_amount:h*r2,notes:notes||null};
  var r=await sb.from('labor').insert(obj);
  if(r.error){showErr(r.error.message);return;}
  if(ev)await syncLaborToEventCrew(ev,per,h);
  closeModal();await loadAll();renderLabor();
}
async function saveLabEdit(id){
  var per=gv('mLbPer'),evId=gv('mLbEv'),hrs=gv('mLbHrs'),rate=gv('mLbRate'),total=gv('mLbTotal'),notes=gv('mLbNotes');
  var h=parseFloat(hrs)||null,r2=parseFloat(rate)||null,t=total?parseFloat(total):h&&r2?h*r2:null;
  var existing=C.labor.find(function(l){return sid(l.id)===sid(id);});
  var oldEventId=existing?existing.event_id:null;
  var newEventId=evId||null;
  var r=await sb.from('labor').update({person:per,event_id:newEventId,hours:h,rate:r2,total_amount:t,notes:notes||null}).eq('id',id);
  if(r.error){showErr(r.error.message);return;}
  // Sync updated hours into the (possibly new) event's crew JSON
  if(newEventId)await syncLaborToEventCrew(newEventId,per,h);
  // If event changed, remove person from old event's crew JSON
  if(oldEventId&&oldEventId!==newEventId){
    var oldEv=C.events.find(function(e){return sid(e.id)===sid(oldEventId);});
    if(oldEv){
      var crew=(oldEv.labor||[]).filter(function(c){return(c.name||'').toLowerCase()!==per.toLowerCase();});
      await sb.from('events').update({labor:crew}).eq('id',oldEventId);
    }
  }
  closeModal();await loadAll();renderLabor();
}

  var per=gv('mHlPer'),ev=gv('mHlEv'),hrs=gv('mHlHrs'),rate=gv('mHlRate'),notes=gv('mHlNotes');

async function saveEqItem(id){
  var name=gv('mEqName'),cat=gv('mEqCat'),desc=gv('mEqDesc'),price=gv('mEqPrice'),notes=gv('mEqNotes');
  if(!name){showErr('Name required.');return;}
  var photoUrl=gv('mEqPhoto');
  var fileInput=document.getElementById('mEqPhotoFile');
  if(fileInput&&fileInput.files&&fileInput.files[0]){
    var file=fileInput.files[0];
    var ext=file.name.split('.').pop();
    var path='eq-'+Date.now()+'-'+name.toLowerCase().replace(/[^a-z0-9]/g,'-')+'.'+ext;
    document.getElementById('msb').textContent='Uploading...';
    document.getElementById('msb').disabled=true;
    // Get current session token and pass explicitly
    var sessionRes=await sb.auth.getSession();
    var token=sessionRes&&sessionRes.data&&sessionRes.data.session&&sessionRes.data.session.access_token;
    var formData=new FormData();
    formData.append('',file,path);
    var uploadRes=await fetch('https://rbtzcswnounmybumqbwu.supabase.co/storage/v1/object/equipment-photos/'+path,{

      headers:token?{'Authorization':'Bearer '+token}:{},
      body:file

    if(!uploadRes.ok){

  var obj={name:name,category:cat||null,description:desc||null,price:price?parseFloat(price):null,photo_url:photoUrl||null,notes:notes||null};

async function delRec(table,id,cb){
  if(!confirm('Delete this record?'))return;
  var r=await sb.from(table).delete().eq('id',id);
  if(r.error){showErr(r.error.message);return;}
  await loadAll();
  if(cb)cb();
  else if(table==='labor')renderLabor();
  else if(table==='profit_share'||table==='labor_payments')renderOwnerFinances();
  else if(table==='expenses')renderExpenses();
  else if(table==='customer_payments')showTab('customers');
  else if(table==='events')showTab('events');
  else if(table==='customers')showTab('customers');
  else if(table==='equipment_items'||table==='equipment_components')showTab('equipment');
  else if(table==='interactions')renderCRM();
}

function qCalcRow(row){

  row.querySelector('.qli-total').textContent=fmt(total);

function qUpdateSubtotal(){

async function saveQuote(id){
  var name=gv('qCuName'),email=gv('qCuEmail'),phone=gv('qCuPhone');
  var evName2=gv('qEvName'),venue=gv('qEvVenue'),evDate=gv('qEvDate'),evTime=gv('qEvTime');
  var tax=gv('qTax'),deposit=gv('qDeposit'),depDate=gv('qDepDate'),valid=gv('qValid'),notes=gv('qNotes'),intNotes=gv('qIntNotes');
  if(!name){showErr('Customer name required.');return;}
  var lineItems=collectQLineItems();
  var taxRate=tax?parseFloat(tax)/100:0;
  var subtotal=lineItems.reduce(function(s,x){return s+(parseFloat(x.total)||0);},0);
  var taxAmt=subtotal*taxRate;
  var obj={customer_name:name,customer_email:email||null,customer_phone:phone||null,
    event_name:evName2||null,venue:venue||null,event_date:evDate||null,event_time:evTime||null,
    tax_rate:taxRate,deposit_amount:deposit?parseFloat(deposit):null,deposit_due_date:depDate||null,
    valid_until:valid||null,notes:notes||null,internal_notes:intNotes||null,
    subtotal:subtotal,tax_amount:taxAmt,total:subtotal+taxAmt,updated_at:new Date().toISOString()};
  var r=id?await sb.from('quotes').update(obj).eq('id',id):await sb.from('quotes').insert(Object.assign({},obj,{status:'draft'}));
  if(r.error){showErr(r.error.message);return;}
  var qId=id||(r.data&&r.data[0]&&r.data[0].id);
  if(!qId){var fresh=await sb.from('quotes').select('id').eq('customer_name',name).order('created_at',{ascending:false}).limit(1);qId=fresh.data&&fresh.data[0]&&fresh.data[0].id;}
  if(qId&&lineItems.length){
    if(id)await sb.from('quote_line_items').delete().eq('quote_id',qId);
    var liObjs=lineItems.map(function(li,i){return{quote_id:qId,type:li.type,label:li.label,description:li.description||null,photo_url:li.photo_url||null,qty:li.qty,unit_price:li.unit_price,total:li.total,sort_order:i};});
    var lr=await sb.from('quote_line_items').insert(liObjs);
    if(lr.error)console.warn('Line items error:',lr.error.message);
  }
  closeModal();await loadAll();renderQuotes();
}

async function saveQuoteItem(quoteId,itemId){
  var type=gv('qLiType'),label=gv('qLiLabel'),desc=gv('qLiDesc'),photo=gv('qLiPhoto');
  var qty=parseFloat(gv('qLiQty'))||1,price=parseFloat(gv('qLiPrice'))||0,total=parseFloat(gv('qLiTotal'))||qty*price;
  if(!label){showErr('Label required.');return;}
  var sortOrder=C.quoteItems.filter(function(x){return x.quote_id===quoteId;}).length;
  var obj={quote_id:quoteId,type:type,label:label,description:desc||null,photo_url:photo||null,
    qty:qty,unit_price:price,total:total,sort_order:itemId?undefined:sortOrder};
  if(itemId)delete obj.sort_order;
  var r=itemId?await sb.from('quote_line_items').update(obj).eq('id',itemId):await sb.from('quote_line_items').insert(obj);
  if(r.error){showErr(r.error.message);return;}
  await loadAll();
  var q2=C.quotes.find(function(x){return x.id===quoteId;});
  if(q2){
    var allItems=C.quoteItems.filter(function(x){return x.quote_id===quoteId;});
    var sub=allItems.reduce(function(s,x){return s+(parseFloat(x.total)||0);},0);
    var ta=sub*(q2.tax_rate||0);
    await sb.from('quotes').update({subtotal:sub,tax_amount:ta,total:sub+ta,updated_at:new Date().toISOString()}).eq('id',quoteId);
  }
  closeModal();await loadAll();openQuoteDetail(quoteId);
}

async function sendQuote(id){
  var q=C.quotes.find(function(x){return x.id===id;});
  if(!q)return;
  if(!q.customer_email){showErr('Customer email required to send quote.');return;}
  if(!confirm('Mark as sent to '+q.customer_email+'?'))return;
  var r=await sb.from('quotes').update({status:'sent',updated_at:new Date().toISOString()}).eq('id',id);
  if(r.error){showErr(r.error.message);return;}
  if(MAKE_QUOTE_WEBHOOK){
    var items=C.quoteItems.filter(function(x){return x.quote_id===id;});
    fetch(MAKE_QUOTE_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:q.token,customer_name:q.customer_name,customer_email:q.customer_email,
        event_name:q.event_name,event_date:q.event_date,venue:q.venue,total:q.total,
        quote_url:QUOTE_PAGE_URL+'?id='+q.token,
        line_items:items.map(function(li){return{label:li.label,qty:li.qty,unit_price:li.unit_price,total:li.total};})
      })
    }).catch(function(e){console.warn('Quote webhook failed:',e);});
  }
  await loadAll();
  // Move CRM customer to proposal stage if we came from CRM
  if(window._crmQuoteCustomerId){
    await sb.from('customers').update({stage:'proposal'}).eq('id',window._crmQuoteCustomerId);
    window._crmQuoteCustomerId=null;
    await loadAll();
  }
  showErr('\u2713 Quote sent'+(MAKE_QUOTE_WEBHOOK?' \u2014 email triggered via Make':''));
  renderQuotes();
}

var CRM_STAGES=['inquiry','contacted','qualified','proposal','booked','completed','lost'];
var CRM_STAGE_LABELS={inquiry:'Inquiry',contacted:'Contacted',qualified:'Qualified',proposal:'Proposal',booked:'Booked',completed:'Completed',lost:'Lost'};
var CRM_STAGE_EMOJI={inquiry:'🔵',contacted:'🟡',qualified:'🟠',proposal:'🟣',booked:'🟢',completed:'⚫',lost:'🔴'};
var CRM_SOURCES=['email','instagram','facebook','referral','website','phone','walk-in','other'];
var CRM_INT_TYPES=['email','call','text','meeting','note','quote','other'];
var CRM_INT_ICONS={email:'✉',call:'📞',text:'💬',meeting:'🤝',note:'📝',quote:'📋',other:'•'};
var crmView='table';
var crmStageFilter='all';

function stageBadge(s){return'<span class="badge stage-'+(s||'inquiry')+'">'+(CRM_STAGE_LABELS[s]||s||'inquiry')+'</span>';}

function lastContactColor(dateStr){
  if(!dateStr)return'last-contact-red';
  var days=Math.floor((new Date()-new Date(dateStr))/(1000*60*60*24));
  return days<=7?'last-contact-green':days<=14?'last-contact-amber':'last-contact-red';
}

function renderCRM(){
  var cuSort2={col:'last_contact',dir:-1};
  var customers=C.customers.slice();

  // Stage counts
  var counts={};
  CRM_STAGES.forEach(function(s){counts[s]=0;});
  customers.forEach(function(c){var s=c.stage||'inquiry';if(counts[s]!=null)counts[s]++;});
  var total=customers.length;

  // Filter
  var filtered=crmStageFilter==='all'?customers:customers.filter(function(c){return(c.stage||'inquiry')===crmStageFilter;});

  var stageBar='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">'+
    '<button class="crm-view-btn'+(crmStageFilter==='all'?' active':'')+'" onclick="setCrmFilter(\'all\')">All ('+total+')</button>'+
    CRM_STAGES.map(function(s){return'<button class="crm-view-btn'+(crmStageFilter===s?' active':'')+'" onclick="setCrmFilter(\''+s+'\')">'+(CRM_STAGE_EMOJI[s]||'')+' '+CRM_STAGE_LABELS[s]+' ('+counts[s]+')</button>';}).join('')+
  '</div>';

  var viewToggle='<div class="crm-view-toggle">'+
    '<button class="crm-view-btn'+(crmView==='table'?' active':'')+'" onclick="setCrmView(\'table\')">☰ Table</button>'+
    '<button class="crm-view-btn'+(crmView==='pipeline'?' active':'')+'" onclick="setCrmView(\'pipeline\')">⬛ Pipeline</button>'+
  '</div>';

  var headerBtns='<button class="btn btn-sm" onclick="openCuModal()">+ Add Lead</button>';

  var body='';
  if(crmView==='pipeline'){
    body='<div style="display:flex;gap:10px;overflow-x:auto;padding-bottom:8px">';
    CRM_STAGES.forEach(function(s){
      var stageCu=customers.filter(function(c){return(c.stage||'inquiry')===s;});
      body+='<div class="pipeline-col">'+
        '<div class="pipeline-col-title" style="color:var(--text)">'+CRM_STAGE_EMOJI[s]+' '+CRM_STAGE_LABELS[s]+' <span style="color:var(--muted);font-weight:400">('+stageCu.length+')</span></div>'+
        stageCu.map(function(c){
          var lastInt=C.interactions.filter(function(i){return sid(i.customer_id)===sid(c.id);}).sort(function(a,b){return b.date.localeCompare(a.date);})[0];
          var lastEv=C.events.filter(function(e){return sid(e.customer_id)===sid(c.id);}).sort(function(a,b){return b.date.localeCompare(a.date);})[0];
          return'<div class="pipeline-card" onclick="openCuCRM(\''+sid(c.id)+'\')">'+
            '<div class="pipeline-card-name">'+esc(c.name)+'</div>'+
            '<div class="pipeline-card-meta">'+(c.event_type_interest?esc(c.event_type_interest)+'<br>':'')+(lastInt?'Last: '+fmtD(lastInt.date):lastEv?'Event: '+fmtD(lastEv.date):'No contact yet')+'</div>'+
            (c.budget_min||c.budget_max?'<div class="pipeline-card-meta" style="margin-top:4px;color:var(--green)">$'+(c.budget_min||0)+' – $'+(c.budget_max||'?')+'</div>':'')+
          '</div>';
        }).join('')+
        (stageCu.length===0?'<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">Empty</div>':'')+
      '</div>';
    });
    body+='</div>';
  } else {
    // Table view
    var sorted=filtered.slice().sort(function(a,b){
      var lastA=C.interactions.filter(function(i){return sid(i.customer_id)===sid(a.id);}).sort(function(x,y){return y.date.localeCompare(x.date);})[0];
      var lastB=C.interactions.filter(function(i){return sid(i.customer_id)===sid(b.id);}).sort(function(x,y){return y.date.localeCompare(x.date);})[0];
      var da=lastA?lastA.date:(a.last_contact||a.inquiry_date||'');
      var db=lastB?lastB.date:(b.last_contact||b.inquiry_date||'');
      return db.localeCompare(da);
    });
    body='<table class="tbl"><thead><tr><th>Name</th><th>Stage</th><th>Source</th><th>Interest</th><th>Budget</th><th>Last Contact</th><th>Interactions</th><th></th></tr></thead><tbody>'+
    (sorted.map(function(c){
      var ints=C.interactions.filter(function(i){return sid(i.customer_id)===sid(c.id);});
      var lastInt=ints.sort(function(a,b){return b.date.localeCompare(a.date);})[0];
      var lastDate=lastInt?lastInt.date:(c.last_contact||c.inquiry_date||'');
      var colorCls=lastDate?lastContactColor(lastDate):'last-contact-red';
      return'<tr style="cursor:pointer" onclick="openCuCRM(\''+sid(c.id)+'\')">'+
        '<td style="font-weight:500">'+esc(c.name)+'<br><span style="font-size:11px;color:var(--muted)">'+esc(c.email||'')+'</span></td>'+
        '<td>'+stageBadge(c.stage||'inquiry')+'</td>'+
        '<td style="font-size:12px;color:var(--muted);text-transform:capitalize">'+esc(c.source||'—')+'</td>'+
        '<td style="font-size:12px">'+esc(c.event_type_interest||'—')+'</td>'+
        '<td style="font-size:12px;color:var(--green)">'+(c.budget_min||c.budget_max?'$'+(c.budget_min||0)+' – $'+(c.budget_max||'?'):'—')+'</td>'+
        '<td class="'+colorCls+'" style="font-size:12px">'+(lastDate?fmtD(lastDate):'<span style="color:var(--accent2)">Never</span>')+'</td>'+
        '<td style="font-size:12px;color:var(--muted)">'+ints.length+'</td>'+
        '<td onclick="event.stopPropagation()"><div class="acts">'+
          '<button class="btn btn-sm btn-outline" onclick="openCuCRM(\''+sid(c.id)+'\')">View</button>'+
          '<button class="btn btn-sm" onclick="openInteractionModal(\''+sid(c.id)+'\')">+ Log</button>'+
        '</div></td>'+
      '</tr>';
    }).join('')||'<tr><td colspan="8" class="empty">No customers</td></tr>')+
    '</tbody></table>';
  }

  document.getElementById('mc').innerHTML=
    sh('CRM Pipeline',headerBtns)+
    stageBar+
    viewToggle+
    body;
}

async function sendCRMReply(customerId){
  var c=C.customers.find(function(x){return sid(x.id)===sid(customerId);});
  if(!c){showErr('Customer not found.');return;}
  var to=gv('replyTo'),subject=gv('replySubject');
  var bodyText=document.getElementById('replyBody')?document.getElementById('replyBody').value:'';
  if(!to){showErr('No email address for this customer.');return;}
  if(!subject||!bodyText){showErr('Subject and message required.');return;}
  // Convert plain text to HTML for email
  var bodyHtml='<div style="font-family:Arial,sans-serif;font-size:14px;line-height:1.6;color:#1a1a2e">'+
    bodyText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')+
    '</div>';

  document.getElementById('msb').textContent='Sending...';
  document.getElementById('msb').disabled=true;

  try{
    await fetch(MAKE_CRM_REPLY_WEBHOOK,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        to_email:to,
        to_name:c.name,
        subject:subject,
        body:bodyHtml,
        customer_id:customerId
      })
    });

    var today=todayStr();
    var loggedBy=typeof userEmail!=='undefined'&&userEmail?userEmail:'GT';
    await sb.from('interactions').insert({
      customer_id:customerId,
      date:today,
      type:'email',
      direction:'outbound',
      subject:subject,
      notes:'Email sent: '+subject,
      created_by:loggedBy
    });

    if((c.stage||'inquiry')==='inquiry'){
      await sb.from('customers').update({stage:'contacted',last_contact:today}).eq('id',customerId);
    } else {
      await sb.from('customers').update({last_contact:today}).eq('id',customerId);
    }

    closeModal();
    await loadAll();
    showErr('\u2713 Email sent and logged');
    openCuCRM(customerId);
  }catch(e){
    console.error('Send error:',e);
    showErr('Error sending: '+e.message);
    var btn=document.getElementById('msb');
    if(btn){btn.textContent='Send Email';btn.disabled=false;}
  }
}

    // Stage quick-move
    '<div style="margin-bottom:16px">'+
      '<div style="font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Move Stage</div>'+
      '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
        CRM_STAGES.map(function(s){
          var active=(c.stage||'inquiry')===s;
          return'<button onclick="moveStage(\''+sid(id)+'\',\''+s+'\')" class="crm-view-btn'+(active?' active':'')+'" style="'+(active?'border-color:var(--accent);background:var(--accent);color:#fff;':'')+'">'+CRM_STAGE_EMOJI[s]+' '+CRM_STAGE_LABELS[s]+'</button>';
        }).join('')+
      '</div>'+
    '</div>'+

    // Interactions
    sh('Interactions ('+ints.length+')','<button class="btn btn-sm" onclick="openInteractionModal(\''+sid(id)+'\')">+ Log</button>')+
    '<div style="margin-bottom:16px">'+
    (ints.length?ints.map(function(i){
      return'<div class="interaction-item">'+
        '<div class="interaction-icon">'+( CRM_INT_ICONS[i.type]||'•')+'</div>'+
        '<div class="interaction-body">'+
          '<div class="interaction-meta">'+fmtD(i.date)+' \u00b7 <span style="text-transform:capitalize">'+esc(i.type)+(i.direction?' \u00b7 '+i.direction:'')+'</span>'+(i.created_by?' \u00b7 by '+esc(i.created_by):'')+'</div>'+
          (i.subject?'<div style="font-weight:600;font-size:13px;margin-bottom:2px">'+esc(i.subject)+'</div>':'')+
          '<div class="interaction-notes">'+esc(i.notes)+'</div>'+
        '</div>'+
        '<button class="btn btn-sm btn-danger" onclick="delRec(\'interactions\',\''+sid(i.id)+'\',function(){openCuCRM(\''+sid(id)+'\');})">Del</button>'+
      '</div>';
    }).join(''):'<div style="color:var(--muted);font-size:13px;padding:12px 0">No interactions logged yet.</div>')+
    '</div>'+

    // Events
    (evs.length?
      sh('Events ('+evs.length+')','')+
      '<table class="tbl"><thead><tr><th>Event</th><th>Date</th><th>Venue</th><th>Invoice</th></tr></thead><tbody>'+
      evs.map(function(e){return'<tr style="cursor:pointer" onclick="openEvDetail(\''+sid(e.id)+'\',\'crm\')"><td style="font-weight:500">'+esc(e.name)+'</td><td>'+fmtD(e.date)+'</td><td style="color:var(--muted)">'+esc(e.venue||'—')+'</td><td>'+(e.invoice_amount?fmt(e.invoice_amount):'—')+'</td></tr>';}).join('')+
      '</tbody></table>':'')+

    // Quotes
    (quotes.length?
      sh('Quotes ('+quotes.length+')','')+
      '<table class="tbl"><thead><tr><th>Event</th><th>Date</th><th>Total</th><th>Status</th><th></th></tr></thead><tbody>'+
      quotes.map(function(q){return'<tr><td>'+esc(q.event_name||'—')+'</td><td>'+fmtD(q.event_date)+'</td><td style="color:var(--green)">'+fmt(q.total)+'</td><td>'+quoteBadge(q.status)+'</td><td><button class="btn btn-sm btn-outline" onclick="openQuotePreview(\''+q.id+'\')">View</button></td></tr>';}).join('')+
      '</tbody></table>':'');
}

function openInteractionModal(customerId,intId){
  var i=intId?C.interactions.find(function(x){return x.id===intId;}):null;
  var c=C.customers.find(function(x){return sid(x.id)===sid(customerId);});
  openModal((i?'Edit':'Log')+' Interaction'+(c?' \u2014 '+c.name:''),
    '<div class="form-group"><label>Date</label><input type="date" id="iDate" value="'+(i?i.date:todayStr())+'"></div>'+
    '<div class="g2">'+
      '<div class="form-group"><label>Type</label><select id="iType">'+
        CRM_INT_TYPES.map(function(t){return'<option value="'+t+'"'+(i&&i.type===t?' selected':'')+'>'+t.charAt(0).toUpperCase()+t.slice(1)+'</option>';}).join('')+
      '</select></div>'+
      '<div class="form-group"><label>Direction</label><select id="iDir">'+
        ['inbound','outbound','internal'].map(function(d){return'<option value="'+d+'"'+(i&&i.direction===d?' selected':(!i&&d==='inbound'?' selected':''))+'>'+d.charAt(0).toUpperCase()+d.slice(1)+'</option>';}).join('')+
      '</select></div>'+
    '</div>'+
    '<div class="form-group"><label>Subject (optional)</label><input id="iSubject" value="'+esc(i?i.subject||'':'')+'"></div>'+
    '<div class="form-group"><label>Notes</label><textarea id="iNotes" style="min-height:80px">'+esc(i?i.notes||'':'')+'</textarea></div>'+
    '<div class="form-group"><label>Logged By</label><select id="iBy">'+
      ['John','Steve','GT'].map(function(p){return'<option value="'+p+'"'+(i&&i.created_by===p?' selected':'')+'>'+p+'</option>';}).join('')+
    '</select></div>',
    function(){saveInteraction(customerId,intId);}
  );
}

async function saveInteraction(customerId,intId){
  var date=gv('iDate'),type=gv('iType'),dir=gv('iDir'),subject=gv('iSubject'),notes=gv('iNotes'),by=gv('iBy');
  if(!notes){showErr('Notes required.');return;}
  var obj={customer_id:customerId,date:date,type:type,direction:dir,subject:subject||null,notes:notes,created_by:by};
  var r=intId?await sb.from('interactions').update(obj).eq('id',intId):await sb.from('interactions').insert(obj);
  if(r.error){showErr(r.error.message);return;}
  // Update last_contact on customer
  await sb.from('customers').update({last_contact:date}).eq('id',customerId);
  closeModal();await loadAll();openCuCRM(customerId);
}

async function moveStage(customerId,stage){
  var r=await sb.from('customers').update({stage:stage}).eq('id',customerId);
  if(r.error){showErr(r.error.message);return;}
  await loadAll();openCuCRM(customerId);
}

// Update openCuModal to include CRM fields
function openCuModal(id){
  var c=id?C.customers.find(function(x){return sid(x.id)===sid(id);}):null;
  openModal(c?'Edit Customer':'New Lead',
    '<div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">Contact Info</div>'+
    '<div class="form-group"><label>Name</label><input id="mCuName" value="'+esc(c?c.name:'')+'"></div>'+
    '<div class="g2">'+
      '<div class="form-group"><label>Email</label><input type="email" id="mCuEmail" value="'+esc(c?c.email||'':'')+'"></div>'+
      '<div class="form-group"><label>Phone</label><input id="mCuPhone" value="'+esc(c?c.phone||'':'')+'"></div>'+
    '</div>'+
    '<div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 10px">CRM</div>'+
    '<div class="g2">'+
      '<div class="form-group"><label>Stage</label><select id="mCuStage">'+
        CRM_STAGES.map(function(s){return'<option value="'+s+'"'+(c&&c.stage===s?' selected':(!c&&s==='inquiry'?' selected':''))+'>'+CRM_STAGE_LABELS[s]+'</option>';}).join('')+
      '</select></div>'+
      '<div class="form-group"><label>Source</label><select id="mCuSource"><option value="">—</option>'+
        CRM_SOURCES.map(function(s){return'<option value="'+s+'"'+(c&&c.source===s?' selected':'')+'>'+s.charAt(0).toUpperCase()+s.slice(1)+'</option>';}).join('')+
      '</select></div>'+
    '</div>'+
    '<div class="g2">'+
      '<div class="form-group"><label>Inquiry Date</label><input type="date" id="mCuInqDate" value="'+(c?c.inquiry_date||'':todayStr())+'"></div>'+
      '<div class="form-group"><label>Preferred Contact</label><select id="mCuPrefCon"><option value="">—</option>'+
        ['email','phone','text'].map(function(s){return'<option value="'+s+'"'+(c&&c.preferred_contact===s?' selected':'')+'>'+s.charAt(0).toUpperCase()+s.slice(1)+'</option>';}).join('')+
      '</select></div>'+
    '</div>'+
    '<div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 10px">Event Interest</div>'+
    '<div class="form-group"><label>Event Type</label><input id="mCuEvType" placeholder="e.g. Wedding, Corporate, Birthday" value="'+esc(c?c.event_type_interest||'':'')+'"></div>'+
    '<div class="g2">'+
      '<div class="form-group"><label>Budget Min ($)</label><input type="number" id="mCuBudMin" value="'+(c?c.budget_min||'':'')+'"></div>'+
      '<div class="form-group"><label>Budget Max ($)</label><input type="number" id="mCuBudMax" value="'+(c?c.budget_max||'':'')+'"></div>'+
    '</div>'+
    '<div class="form-group"><label>Headcount</label><input type="number" id="mCuHead" value="'+(c?c.headcount||'':'')+'"></div>'+
    '<div class="form-group"><label>Referral Source</label><input id="mCuRef" placeholder="who referred them" value="'+esc(c?c.referral_source||'':'')+'"></div>'+
    '<div class="form-group"><label>Notes</label><textarea id="mCuNotes">'+esc(c?c.notes||'':'')+'</textarea></div>',
    function(){saveCu(id);}
  );
}

async function saveCu(id){
  var name=gv('mCuName'),email=gv('mCuEmail'),phone=gv('mCuPhone');
  var stage=gv('mCuStage'),source=gv('mCuSource'),inqDate=gv('mCuInqDate'),prefCon=gv('mCuPrefCon');
  var evType=gv('mCuEvType'),budMin=gv('mCuBudMin'),budMax=gv('mCuBudMax'),head=gv('mCuHead'),ref=gv('mCuRef'),notes=gv('mCuNotes');
  if(!name){showErr('Name required.');return;}
  var obj={name:name,email:email||null,phone:phone||null,notes:notes||null,
    stage:stage||'inquiry',source:source||null,inquiry_date:inqDate||null,preferred_contact:prefCon||null,
    event_type_interest:evType||null,budget_min:budMin?parseInt(budMin):null,budget_max:budMax?parseInt(budMax):null,
    headcount:head?parseInt(head):null,referral_source:ref||null};
  var r=id?await sb.from('customers').update(obj).eq('id',id):await sb.from('customers').insert(obj);
  if(r.error){showErr(r.error.message);return;}
  closeModal();await loadAll();
  if(currentTab==='crm')renderCRM();else showTab('customers');
}


init();
</script>
