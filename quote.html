<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Event Quote — Groove Tech Rental</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Helvetica Neue",Arial,sans-serif;background:#f4f4f8;color:#1a1a2e;padding:20px;}
.page{max-width:760px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 32px rgba(0,0,0,.12);}
.hdr{background:#1a1a2e;padding:28px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.hdr img{height:52px;}
.hdr-r{text-align:right;font-size:13px;color:rgba(255,255,255,.6);}
.hdr-r .qt{font-size:20px;font-weight:700;color:#b39ddb;margin-bottom:4px;}
.body{padding:28px 32px;}
.stitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#999;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #eee;}
.two{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}
@media(max-width:520px){.two{grid-template-columns:1fr;}.hdr{flex-direction:column;}.hdr-r{text-align:left;}}
.ib p{font-size:13px;color:#555;margin-bottom:3px;line-height:1.5;}
.ib strong{color:#1a1a2e;}
.eq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;margin-bottom:24px;}
.eqc{border:1px solid #eee;border-radius:10px;overflow:hidden;}
.eqc img{width:100%;height:130px;object-fit:cover;display:block;}
.eqc-placeholder{height:130px;background:#f0f0f5;display:flex;align-items:center;justify-content:center;font-size:32px;}
.eqc-b{padding:10px 12px;}
.eqc-n{font-weight:600;font-size:14px;margin-bottom:3px;}
.eqc-d{font-size:12px;color:#aaa;margin-bottom:5px;}
.eqc-p{font-size:12px;color:#555;}
table{width:100%;border-collapse:collapse;margin-bottom:24px;font-size:13px;}
th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#aaa;padding:9px 10px;text-align:left;border-bottom:2px solid #eee;}
td{padding:9px 10px;border-bottom:1px solid #f2f2f2;vertical-align:top;}
tr:last-child td{border-bottom:none;}
.tots{max-width:260px;margin-left:auto;margin-bottom:24px;}
.tr{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;border-bottom:1px solid #f2f2f2;}
.grand{font-size:17px;font-weight:700;border-bottom:none;border-top:2px solid #1a1a2e;padding-top:10px;margin-top:4px;}
.dep{color:#6c3fc8;font-weight:600;border-bottom:none;}
.nbox{background:#f9f9fc;border-radius:8px;padding:14px;margin-bottom:24px;font-size:13px;color:#555;line-height:1.6;}
.sbox{background:#f0f7ff;border:1px solid #c5dff8;border-radius:12px;padding:24px;margin-bottom:8px;}
.sbox h3{font-size:17px;font-weight:700;margin-bottom:6px;color:#1a1a2e;}
.sbox p{font-size:13px;color:#666;margin-bottom:16px;line-height:1.5;}
input[type=text]{width:100%;padding:12px 14px;border:2px solid #ddd;border-radius:8px;font-size:16px;font-family:inherit;margin-bottom:12px;outline:none;transition:border-color .2s;}
input[type=text]:focus{border-color:#6c3fc8;}
.sbtn{background:#6c3fc8;color:#fff;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:background .15s;letter-spacing:.3px;}
.sbtn:hover{background:#5a32a8;}
.sbtn:disabled{background:#aaa;cursor:not-allowed;}
.signed{background:#e8f5e9;border:1px solid #a5d6a7;border-radius:10px;padding:20px;text-align:center;color:#2e7d32;font-weight:600;font-size:15px;}
.declined{background:#fce4ec;border:1px solid #ef9a9a;border-radius:10px;padding:20px;text-align:center;color:#c62828;font-weight:600;font-size:15px;}
.loader{text-align:center;padding:60px;color:#999;font-size:15px;}
.err{text-align:center;padding:60px;color:#c62828;font-size:15px;}
.foot{background:#f5f5f7;padding:16px 32px;text-align:center;font-size:12px;color:#aaa;}
.badge{display:inline-block;font-size:10px;font-weight:700;border-radius:20px;padding:3px 10px;margin-left:8px;}
.badge-sent{background:rgba(79,195,247,.15);color:#0288d1;border:1px solid rgba(79,195,247,.3);}
.badge-accepted{background:rgba(76,175,80,.15);color:#2e7d32;border:1px solid rgba(76,175,80,.3);}
@media print{body{background:#fff;padding:0;}.sbox{display:none;}.page{box-shadow:none;border-radius:0;}.foot{display:none;}}
</style>
</head>
<body>

<div class="page" id="page">
  <div class="loader" id="loader">Loading your quote…</div>
</div>

<script>
var SUPABASE_URL='https://rbtzcswnounmybumqbwu.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJidHpjc3dub3VubXlidW1xYnd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyOTI3OTgsImV4cCI6MjA5MTg2ODc5OH0.d_CSDndGJcuBve_EtHo8RDcHG8dxQVn22gpUjQ7FGNY';
var sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var quoteToken=null;
var quoteId=null;

function fmt(n){return'$'+(parseFloat(n)||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function fmtD(d){return d?new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}):'—';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getToken(){
  var params=new URLSearchParams(window.location.search);
  return params.get('id');
}

async function loadQuote(){
  var token=getToken();
  if(!token){
    showError('No quote ID found in this link. Please check the link in your email.');
    return;
  }
  quoteToken=token;

  var qRes=await sb.from('quotes').select('*').eq('token',token).single();
  if(qRes.error||!qRes.data){
    showError('Quote not found. The link may be expired or invalid.');
    return;
  }
  var q=qRes.data;
  quoteId=q.id;

  var liRes=await sb.from('quote_line_items').select('*').eq('quote_id',q.id).order('sort_order');
  var items=liRes.data||[];

  renderQuote(q,items);
}

function showError(msg){
  document.getElementById('page').innerHTML='<div class="err">'+esc(msg)+'</div>';
}

function renderQuote(q,items){
  var eqItems=items.filter(function(x){return x.type==='equipment';});
  var svcItems=items.filter(function(x){return x.type!=='equipment';});

  var statusBadge='';
  if(q.status==='accepted')statusBadge='<span class="badge badge-accepted">&#10003; Accepted</span>';
  else if(q.status==='sent')statusBadge='<span class="badge badge-sent">Awaiting Signature</span>';

  var html=
    '<div class="hdr">'+
      '<img src="https://groovetechrental.com/wp-content/uploads/2024/09/gtfulllogo-edited-2959047573-e1725910986602.png" alt="Groove Tech Rental">'+
      '<div class="hdr-r">'+
        '<div class="qt">Event Quote'+statusBadge+'</div>'+
        '<div>groovetechrental.com</div>'+
        '<div>'+new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})+'</div>'+
        (q.valid_until?'<div>Valid until: '+fmtD(q.valid_until)+'</div>':'')+
      '</div>'+
    '</div>'+
    '<div class="body">'+
      '<div class="two">'+
        '<div><div class="stitle">Prepared For</div><div class="ib">'+
          '<p><strong>'+esc(q.customer_name)+'</strong></p>'+
          (q.customer_email?'<p>'+esc(q.customer_email)+'</p>':'')+
          (q.customer_phone?'<p>'+esc(q.customer_phone)+'</p>':'')+
        '</div></div>'+
        '<div><div class="stitle">Event Details</div><div class="ib">'+
          (q.event_name?'<p><strong>'+esc(q.event_name)+'</strong></p>':'')+
          (q.venue?'<p>&#128205; '+esc(q.venue)+'</p>':'')+
          (q.event_date?'<p>&#128197; '+fmtD(q.event_date)+'</p>':'')+
          (q.event_time?'<p>&#128336; '+esc(q.event_time)+'</p>':'')+
        '</div></div>'+
      '</div>';

  if(eqItems.length){
    html+='<div class="stitle">Equipment</div><div class="eq-grid">';
    eqItems.forEach(function(li){
      html+='<div class="eqc">'+
        (li.photo_url?'<img src="'+esc(li.photo_url)+'" alt="'+esc(li.label)+'">':'<div class="eqc-placeholder">&#127916;</div>')+
        '<div class="eqc-b">'+
          '<div class="eqc-n">'+esc(li.label)+'</div>'+
          (li.description?'<div class="eqc-d">'+esc(li.description)+'</div>':'')+
          '<div class="eqc-p">Qty: '+li.qty+' &nbsp;&middot;&nbsp; '+fmt(li.unit_price)+' each</div>'+
        '</div></div>';
    });
    html+='</div>';
  }

  if(svcItems.length){
    html+='<div class="stitle">Services</div>'+
      '<table><thead><tr><th>Service</th><th>Description</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr></thead><tbody>';
    svcItems.forEach(function(li){
      html+='<tr>'+
        '<td><strong>'+esc(li.label)+'</strong><br><small style="color:#aaa;text-transform:capitalize">'+esc(li.type)+'</small></td>'+
        '<td style="color:#888">'+esc(li.description||'')+'</td>'+
        '<td>'+li.qty+'</td><td>'+fmt(li.unit_price)+'</td><td><strong>'+fmt(li.total)+'</strong></td></tr>';
    });
    html+='</tbody></table>';
  }

  html+=
    '<div class="tots">'+
      '<div class="tr"><span>Subtotal</span><span>'+fmt(q.subtotal)+'</span></div>'+
      (q.tax_rate?'<div class="tr"><span>Tax ('+(q.tax_rate*100).toFixed(1)+'%)</span><span>'+fmt(q.tax_amount)+'</span></div>':'')+
      '<div class="tr grand"><span>Total</span><span>'+fmt(q.total)+'</span></div>'+
      (q.deposit_amount?'<div class="tr dep"><span>Deposit Required</span><span>'+fmt(q.deposit_amount)+'</span></div>':'')+
    '</div>'+
    (q.notes?'<div class="stitle">Notes</div><div class="nbox">'+esc(q.notes).replace(/\n/g,'<br>')+'</div>':'')+
    '<div class="sbox" id="signWrap">';

  if(q.signed_name){
    html+='<div class="signed">&#10003; Accepted &amp; signed by <strong>'+esc(q.signed_name)+'</strong> on '+new Date(q.signed_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'})+'</div>';
  } else if(q.status==='sent'){
    html+=
      '<h3>Accept This Quote</h3>'+
      '<p>By signing below you agree to the terms of this quote.'+(q.deposit_amount?' A deposit of <strong>'+fmt(q.deposit_amount)+'</strong> is required to secure your date.':'')+'</p>'+
      '<input type="text" id="sigName" placeholder="Type your full name to sign" autocomplete="name">'+
      '<button class="sbtn" id="sigBtn" onclick="doSign()">&#9997;&nbsp; Sign &amp; Accept Quote</button>';
  } else {
    html+='<p style="text-align:center;color:#aaa;font-size:13px">This quote has not yet been sent.</p>';
  }

  html+=
    '</div></div>'+
    '<div class="foot">Groove Tech Rental &nbsp;&middot;&nbsp; groovetechrental.com &nbsp;&middot;&nbsp; Thank you for your business!</div>';

  document.getElementById('page').innerHTML=html;
}

async function doSign(){
  var name=(document.getElementById('sigName').value||'').trim();
  if(!name){alert('Please type your full name to sign.');return;}
  if(!confirm('Sign as "'+name+'"?\n\nThis confirms your agreement to the quote terms.'))return;
  var btn=document.getElementById('sigBtn');
  btn.disabled=true;
  btn.textContent='Signing\u2026';
  var r=await sb.from('quotes').update({
    signed_name:name,
    signed_at:new Date().toISOString(),
    status:'accepted'
  }).eq('token',quoteToken);
  if(r.error){
    alert('Error signing: '+r.error.message);
    btn.disabled=false;
    btn.textContent='Sign & Accept Quote';
    return;
  }
  document.getElementById('signWrap').innerHTML=
    '<div class="signed">&#10003; Signed by <strong>'+esc(name)+'</strong>. Thank you! We\'ll be in touch shortly to confirm your booking.</div>';
}

loadQuote();
</script>
</body>
</html>
